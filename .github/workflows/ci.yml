name: CI

on:
  push:
    paths-ignore:
      - 'LICENSE'
      - '**.md'
      - '**.yml'
  pull_request:
    paths-ignore:
      - 'LICENSE'
      - '**.md'
      - '**.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: .NET setup
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: .NET version
        run: dotnet --version

      - name: .NET nuget
        run: |
          cp ./nuget.tmp ./nuget.config
          sed -i 's|{{ TELERIK_KEY }}|${{ secrets.TELERIK_KEY }}|g' ./nuget.config

      - name: .NET cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: .NET restore
        run: dotnet restore

      - name: .NET build
        run: dotnet build --no-restore --configuration Debug
        env:
          TELERIK_LICENSE: ${{ secrets.TELERIK_LICENSE }}