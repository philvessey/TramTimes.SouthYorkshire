version: 2

registries:
  nuget.org:
    type: nuget-feed
    url: "https://api.nuget.org/v3/index.json"
  telerik.com:
    type: nuget-feed
    url: "https://nuget.telerik.com/v3/index.json"
    username: "api-key"
    password: ${{ secrets.TELERIK_KEY }}

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    registries:
      - nuget.org
      - telerik.com
    schedule:
      interval: "weekly"
      time: "09:00"
    reviewers:
      - "philvessey"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      packages:
        patterns:
          - "*"
    ignore:
      - dependency-name: "Aspire.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "09:00"
    reviewers:
      - "philvessey"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"